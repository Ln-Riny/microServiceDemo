server:
  port: 8081
spring:
  application:
    name: msrv-user
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        server-addr: localhost:8848
        file-extension: yaml
        namespace: public
        group: DEFAULT_GROUP
        username: nacos
        password: nacos
        timeout: 5000
        connect-timeout: 5000
        # 配置重试
        max-retry: 10
        retry-delay: 1000
        # 等待配置加载完成
        fail-fast: false
dubbo:
  application:
    name: msrv-user
  registry:
    address: nacos://127.0.0.1:8848
  protocol:
    name: dubbo
    port: 20880
  scan:
    base-packages: me.lining.learn.interfaces.facade.dubbo